<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Submit | Hacker News</title>
  </head>
  <body>
    <p>You have to be logged in to submit.</p>
    <table>
      <tr>
        <td>
          <b>Login</b>
          <form method="post">
            username: <input type="text" name="acct" size="20" autocomplete="username" />
            <br />
            password: <input type="password" name="pw" size="20" />
            <br />
            <input type="submit" value="login" />
          </form>
        </td>
      </tr>
      <tr>
        <td>
          <b>Create Account</b>
          <form method="post">
            username: <input type="text" name="acct" size="20" autocomplete="username" />
            <br />
            password: <input type="password" name="pw" size="20" />
            <br />
            <input type="submit" value="create account" />
          </form>
        </td>
      </tr>
    </table>
  </body>
</html>
