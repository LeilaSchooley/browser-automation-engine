<!DOCTYPE html>
<html>
  <body>
    <div class="application application-form">
      <ul>
        <li class="application-question">
          <label>
            <div class="application-label">Full name<span class="required">✱</span></div>
            <div class="application-field"><input data-qa="name-input" name="name" required /></div>
          </label>
        </li>
        <li class="application-question">
          <div class="application-label multiple-select">Pronouns</div>
          <div class="application-field">
            <ul data-qa="candidatePronounsCheckboxes" id="candidatePronounsCheckboxes">
              <li>
                <label
                  ><input type="checkbox" name="pronouns" value="He/him" class="standardPronounsOption" /><span
                    >He/him</span
                  ></label
                >
              </li>
              <li>
                <label
                  ><input type="checkbox" name="pronouns" value="She/her" class="standardPronounsOption" /><span
                    >She/her</span
                  ></label
                >
              </li>
              <li>
                <label
                  ><input type="checkbox" name="pronouns" value="Use name only" id="useNameOnlyPronounsOption" /><span
                    >Use name only</span
                  ></label
                >
              </li>
            </ul>
          </div>
        </li>
        <li class="application-question">
          <label>
            <div class="application-label">Email<span class="required">✱</span></div>
            <div class="application-field"><input name="email" data-qa="email-input" type="email" required /></div>
          </label>
        </li>
        <li class="application-question">
          <label>
            <div class="application-label">Phone<span class="required">✱</span></div>
            <div class="application-field"><input name="phone" type="text" required /></div>
          </label>
        </li>
        <li class="application-question">
          <label>
            <div class="application-label">LinkedIn URL</div>
            <div class="application-field"><input type="text" name="urls[LinkedIn]" /></div>
          </label>
        </li>
        <li class="application-question">
          <label>
            <div class="application-label">Other website</div>
            <div class="application-field"><input type="text" name="urls[Other]" /></div>
          </label>
        </li>
      </ul>

      <div data-qa="additional-cards">
        <li class="application-question custom-question">
          <div class="application-label full-width">Complete Street Address<span class="required">✱</span></div>
          <div class="application-field full-width required-field">
            <input required class="card-field-input" type="text" placeholder="Type your response" name="cards[x][field3]" />
          </div>
        </li>
        <li class="application-question custom-question">
          <div class="application-label full-width">City, State, &amp; Zip Code<span class="required">✱</span></div>
          <div class="application-field full-width required-field">
            <input required class="card-field-input" type="text" placeholder="Type your response" name="cards[x][field4]" />
          </div>
        </li>
        <li class="application-question custom-question">
          <div class="application-label full-width">
            Are you legally authorized to work in the United States for any employer?<span class="required">✱</span>
          </div>
          <div class="application-field full-width required-field">
            <ul data-qa="multiple-choice">
              <li>
                <label
                  ><input type="radio" name="cards[x][field5]" value="Yes" required /><span>Yes</span></label
                >
              </li>
              <li>
                <label
                  ><input type="radio" name="cards[x][field5]" value="No" required /><span>No</span></label
                >
              </li>
            </ul>
          </div>
        </li>
      </div>

      <div class="eeo-survey">
        <div class="application-question">
          <label>
            <div class="application-label">Gender</div>
            <div class="application-field">
              <select name="eeo[gender]">
                <option value="">Select ...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Decline to self-identify">Decline to self-identify</option>
              </select>
            </div>
          </label>
        </div>
        <div class="application-question">
          <label>
            <div class="application-label">Race</div>
            <div class="application-field">
              <select name="eeo[race]">
                <option value="">Select ...</option>
                <option value="White (Not Hispanic or Latino)">White (Not Hispanic or Latino)</option>
                <option value="Decline to self-identify">Decline to self-identify</option>
              </select>
            </div>
          </label>
        </div>
        <div class="application-question">
          <label>
            <div class="application-label">Veteran status</div>
            <div class="application-field">
              <select name="eeo[veteran]">
                <option value="">Select ...</option>
                <option value="I am a veteran">I am a veteran</option>
                <option value="I am not a veteran">I am not a veteran</option>
                <option value="Decline to self-identify">Decline to self-identify</option>
              </select>
            </div>
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
