<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nested salary picker</title>
  <style>
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; }
    .modal { background: #fff; padding: 1.5rem; border-radius: 8px; min-width: 320px; }
    .field { margin: 0.75rem 0; padding: 0.5rem; border: 1px solid #ccc; cursor: pointer; }
    .picker { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; }
    .picker-panel { background: #fff; padding: 1rem; min-width: 280px; }
    .option { padding: 0.5rem; cursor: pointer; border-bottom: 1px solid #eee; }
    .option.selected { background: #f5e6d3; }
    .save-btn { margin-top: 1rem; padding: 0.75rem; background: salmon; color: #fff; text-align: center; cursor: pointer; border: none; width: 100%; }
    .ds-button { display: block; }
  </style>
</head>
<body>
  <div class="overlay" role="presentation">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Tell us about yourself">
      <h2>Tell us about yourself</h2>
      <label>Location</label>
      <input type="text" id="location" value="Germany" aria-label="Location" />
      <label>Salary expectations</label>
      <div id="salary-trigger" role="combobox" aria-haspopup="listbox" aria-expanded="false" class="field" tabindex="0">?</div>
      <label>Desired job title</label>
      <input type="text" id="title" value="Platform Engineer" aria-label="Desired job title" />
      <button type="button" id="signup-cta">Sign up now for free</button>
    </div>
  </div>

  <div id="salary-picker" class="picker" role="dialog" aria-modal="true" aria-label="Salary" style="display:none">
    <div class="picker-panel">
      <h3>Salary</h3>
      <div role="listbox" aria-label="Salary bands">
        <div role="option" class="option" data-value="0-10">USD 0 - 10,000</div>
        <div role="option" class="option" data-value="60-80">USD 60,000 - 80,000</div>
        <div role="option" class="option" data-value="80-100">USD 80,000 - 100,000</div>
      </div>
      <button type="button" class="save-btn ds-button">Save</button>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('salary-trigger');
    const picker = document.getElementById('salary-picker');
    const options = picker.querySelectorAll('[role=option]');
    const saveBtn = picker.querySelector('.save-btn');

    trigger.addEventListener('click', () => {
      picker.style.display = 'flex';
      trigger.setAttribute('aria-expanded', 'true');
    });

    options.forEach((opt) => {
      opt.addEventListener('click', () => {
        options.forEach((o) => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
    });

    saveBtn.addEventListener('click', () => {
      const selected = picker.querySelector('.option.selected');
      if (selected) {
        trigger.textContent = selected.textContent.trim();
        trigger.setAttribute('aria-expanded', 'false');
      }
      picker.style.display = 'none';
    });
  </script>
</body>
</html>
