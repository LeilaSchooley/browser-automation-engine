<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Platform Engineer | JobLeads.com</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #f4f4f4; }
      body.modal-open { overflow: hidden; }
      .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; }
      .ui-modal { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); background: #fff; border-radius: 16px; padding: 28px; width: 440px; z-index: 1001; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
      .ui-modal h2 { margin: 0 0 12px; font-size: 1.15rem; }
      .ui-modal p { color: #444; line-height: 1.5; }
      .ui-modal button { display: block; width: 100%; margin-top: 14px; padding: 14px 18px; border: 0; border-radius: 999px; font-size: 1rem; cursor: pointer; }
      .primary { background: #ff6b6b; color: #fff; }
      .secondary { background: transparent; color: #333; border: 1px solid #ccc !important; }
      .file-pill { display: inline-block; padding: 8px 12px; background: #f0f0f0; border-radius: 999px; margin: 12px 0; }
      #apply-form { padding: 24px; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body class="modal-open">
    <div id="job-card" style="padding:24px">
      <h1>Platform Engineer &amp; Web Admin</h1>
      <button id="apply-btn">I'm interested</button>
    </div>

    <div class="backdrop"></div>

    <div class="ui-modal" role="dialog" aria-modal="true" data-testid="ui-modal-resume-builder-check">
      <h2>Get a free expert review to improve your resume</h2>
      <p>Your resume is not ready yet? Upload resume for a free expert review.</p>
      <div class="file-pill">Isaac Boadi Resume Platform Engineer.pdf</div>
      <input type="file" data-testid="ui-uploader" style="display:none" />
      <div class="primary ds-button" data-testid="ds-button" role="presentation">Upload resume</div>
      <div id="skip-continue" class="secondary ds-button" data-testid="ds-button" style="cursor:pointer">Skip and continue</div>
    </div>

    <div id="apply-form" class="hidden">
      <h2>Application form</h2>
      <label>First name <input id="first-name" name="firstName" type="text" /></label>
      <label>Last name <input id="last-name" name="lastName" type="text" /></label>
      <label>Email <input id="email" name="email" type="email" /></label>
    </div>

    <script>
      document.getElementById("skip-continue").addEventListener("click", () => {
        document.querySelector(".ui-modal").classList.add("hidden");
        document.querySelector(".backdrop").classList.add("hidden");
        document.body.classList.remove("modal-open");
        document.getElementById("apply-form").classList.remove("hidden");
      });
    </script>
  </body>
</html>
