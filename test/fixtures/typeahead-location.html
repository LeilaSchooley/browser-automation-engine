<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typeahead location</title>
</head>
<body>
  <div role="dialog" aria-modal="true" aria-label="Tell us about yourself">
    <label for="loc-input">Location</label>
    <input id="loc-input" role="combobox" aria-autocomplete="list" aria-expanded="true" />
    <div role="listbox">
      <div role="option">Berlin, Germany</div>
      <div role="option">Munich, Germany</div>
    </div>
  </div>
</body>
</html>
